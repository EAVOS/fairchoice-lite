<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>FairChoice Lite</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="css/style.css?v=6">
</head>
<body>
    <div id="app">
        <!-- Главный экран -->
        <div id="home-screen">
            <h1>📊 FairChoice Lite</h1>
            <input type="text" id="question" class="input-field" placeholder="❓ Что выбираем?">
            <textarea id="options" class="input-field" placeholder="📝 Варианты через запятую:&#10;Пицца, Суши, Бургер" rows="3"></textarea>
            <button class="btn btn-primary" id="create-btn">🚀 Создать опрос</button>
            <button class="btn btn-secondary" id="my-polls-btn">📋 Мои активные опросы</button>
            <button class="btn btn-secondary" id="ended-polls-btn">📁 Завершённые опросы</button>
            <button class="btn btn-secondary" id="admin-stats-btn" style="display:none;">📊 Статистика</button>
            <div id="error" class="message error-msg"></div>
            <div id="success" class="message success-msg"></div>
        </div>

        <!-- Экран созданного опроса -->
        <div id="created-screen" class="hidden">
            <h1>✅ Опрос создан!</h1>
            <div id="created-content"></div>
            <button class="btn btn-share" id="share-to-chat-btn">📤 Отправить в чат</button>
            <button class="btn btn-primary" id="vote-now-btn">🗳️ Голосовать</button>
            <button class="btn btn-secondary" id="copy-link-btn">📋 Копировать ссылку</button>
            <button class="btn btn-secondary" id="end-poll-btn" style="display:none;">⏹️ Завершить опрос</button>
            <p style="text-align:center;margin-top:12px;font-size:12px;color:rgba(255,255,255,0.5);">
                📡 Подпишись на <a href="https://t.me/FairChoiceLab" style="color:#39ff14;">@FairChoiceLab</a> — там лучшие опросы недели
            </p>
            <button class="btn btn-secondary" id="back-home-btn">🏠 На главную</button>
        </div>

        <!-- Экран голосования -->
        <div id="vote-screen" class="hidden">
            <h1 id="question-display"></h1>
            <p class="subtitle">Расставь варианты (🥇🥈🥉)</p>
            <div id="rankings"></div>
            <button class="btn btn-secondary" id="shuffle-btn">🎲 Перемешать</button>
            <button class="btn btn-primary" id="vote-btn">✅ Проголосовать</button>
            <button class="btn btn-secondary" id="end-poll-btn-vote" style="display:none;">⏹️ Завершить опрос</button>
            <button class="btn btn-secondary" id="view-results-btn">📊 Результаты</button>
            <button class="btn btn-secondary" id="back-to-list-btn">📋 Мои активные опросы</button>
        </div>

        <!-- Экран результатов -->
        <div id="results-screen" class="hidden">
            <h1 id="results-title">🏆 Результаты</h1>
            <div id="results-display"></div>
            <button class="btn btn-share" id="publish-to-channel-btn">📡 Опубликовать в Счётной палате</button>
            <button class="btn btn-share" id="share-results-btn">📤 Поделиться</button>
            <button class="btn btn-secondary" id="refresh-results-btn">🔄 Обновить</button>
            <button class="btn btn-secondary" id="end-poll-btn-results" style="display:none;">⏹️ Завершить опрос</button>
            <button class="btn btn-secondary" id="back-to-vote-btn" style="display:none;">🗳️ Вернуться к голосованию</button>
            <button class="btn btn-secondary" id="back-to-list-btn-results">📋 Мои активные опросы</button>
            <button class="btn btn-secondary" id="new-poll-btn">➕ Новый опрос</button>
        </div>

        <!-- Загрузчик -->
        <div id="loader" class="hidden">
            <div class="loading-spinner"></div>
            <p class="loader-text">Загрузка<span id="loader-dots">...</span></p>
        </div>
    </div>

    <script src="js/config.js?v=7"></script>
    <script src="js/utils.js?v=7"></script>
    <script src="js/api.js?v=7"></script>
    <script src="js/poll.js?v=7"></script>
    <script src="js/vote.js?v=7"></script>
    <script src="js/results.js?v=7"></script>
    <script src="js/share.js?v=7"></script>
    <script src="js/app.js?v=7"></script>
</body>
</html>
