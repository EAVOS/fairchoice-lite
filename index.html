<!-- FairChoice Lite v17 - All Bugs Fixed -->
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>FairChoice Lite</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background: #1a1a2e; 
            color: #ffffff; 
            min-height: 100vh; 
            padding: 16px;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        #app { max-width: 400px; margin: 0 auto; }
        h1 { font-size: 24px; font-weight: 700; margin-bottom: 16px; text-align: center; }
        
        .input-field { 
            width: 100%; 
            padding: 12px; 
            border-radius: 8px; 
            border: 1px solid rgba(255,255,255,0.1); 
            margin: 8px 0; 
            font-size: 16px; 
            background: rgba(255,255,255,0.1); 
            color: #fff;
            outline: none;
            transition: border-color 0.2s;
        }
        .input-field:focus { border-color: #39ff14; }
        .input-field::placeholder { color: rgba(255,255,255,0.4); }
        textarea.input-field { resize: vertical; min-height: 80px; }
        
        .btn { 
            width: 100%; 
            padding: 14px; 
            border: none; 
            border-radius: 12px; 
            font-size: 16px; 
            font-weight: 600; 
            cursor: pointer; 
            margin: 8px 0; 
            transition: all 0.15s ease;
            position: relative;
            overflow: hidden;
        }
        .btn:active { transform: scale(0.97); opacity: 0.85; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-primary { background: #39ff14; color: #1a1a2e; }
        .btn-secondary { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2); }
        .btn-share { background: rgba(0,136,204,0.3); color: #39ff14; border: 1px solid rgba(0,136,204,0.3); }
        .btn-telegram { background: rgba(0,136,204,0.4); color: #fff; border: 1px solid rgba(0,136,204,0.5); }
        
        .poll-card { 
            background: rgba(255,255,255,0.08); 
            border-radius: 12px; 
            padding: 14px; 
            margin: 8px 0; 
            font-size: 16px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        
        .error-msg { 
            color: #ff4444; 
            text-align: center; 
            padding: 12px; 
            display: none; 
            font-size: 14px;
            background: rgba(255,68,68,0.1);
            border-radius: 8px;
            margin: 8px 0;
        }
        .error-msg.show { display: block; }
        
        .success-msg { 
            color: #39ff14; 
            text-align: center; 
            padding: 12px; 
            display: none; 
            font-size: 14px;
            background: rgba(57,255,20,0.1);
            border-radius: 8px;
            margin: 8px 0;
        }
        .success-msg.show { display: block; }
        
        .voter-count { 
            text-align: center; 
            color: rgba(255,255,255,0.5); 
            font-size: 14px; 
            margin-top: 12px; 
        }
        
        .hidden { display: none !important; }
        
        .sort-btn { 
            background: rgba(255,255,255,0.15); 
            border: 1px solid rgba(255,255,255,0.1); 
            color: white; 
            cursor: pointer; 
            font-size: 16px; 
            padding: 4px 10px;
            border-radius: 6px;
            line-height: 1;
        }
        .sort-btn:disabled { opacity: 0.2; cursor: default; }
        
        .share-link-container { 
            background: rgba(255,255,255,0.1); 
            padding: 16px; 
            border-radius: 12px; 
            margin: 12px 0;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .share-link { 
            word-break: break-all; 
            font-size: 14px; 
            text-align: center;
            color: #39ff14;
            user-select: all;
            margin-bottom: 8px;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
        }
        
        .share-note {
            font-size: 12px;
            color: rgba(255,255,255,0.6);
            text-align: center;
            margin-top: 8px;
            line-height: 1.4;
        }
        
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #39ff14;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .divider {
            border-top: 1px solid rgba(255,255,255,0.1);
            margin: 12px 0;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Главный экран -->
        <div id="home-screen">
            <h1>📊 FairChoice Lite</h1>
            <input type="text" id="question" class="input-field" placeholder="❓ Что выбираем? Например: Куда пойти вечером?">
            <textarea id="options" class="input-field" placeholder="📝 Варианты через запятую:&#10;Пицца, Суши, Бургер" rows="3"></textarea>
            <button class="btn btn-primary" id="create-btn">🚀 Создать опрос</button>
            <div id="error" class="error-msg"></div>
            <div id="success" class="success-msg"></div>
        </div>

        <!-- Экран "Опрос создан" -->
        <div id="created-screen" class="hidden">
            <h1>✅ Опрос создан!</h1>
            <p style="text-align:center; margin-bottom: 16px;">Поделитесь ссылкой с участниками:</p>
            <div class="share-link-container">
                <div style="margin-bottom:6px;font-size:13px;color:rgba(255,255,255,0.8);">
                    📱 <strong>Ссылка для голосования:</strong>
                </div>
                <div class="share-link" id="share-link-text"></div>
                <div class="share-note">
                    👆 <strong>Нажмите на ссылку выше</strong>, чтобы скопировать её.<br>
                    Затем отправьте друзьям в любой чат Telegram.
                </div>
            </div>
            <button class="btn btn-share" id="share-link-btn">📤 Поделиться через Telegram</button>
            <div class="divider"></div>
            <button class="btn btn-primary" id="vote-now-btn">🗳️ Проголосовать самому</button>
            <button class="btn btn-secondary" id="back-home-btn">🏠 На главную</button>
        </div>

        <!-- Экран голосования -->
        <div id="vote-screen" class="hidden">
            <h1 id="question-display"></h1>
            <p style="text-align:center; color: rgba(255,255,255,0.6); font-size: 14px; margin-bottom: 8px;">
                Расставь варианты по местам (🥇🥈🥉)
            </p>
            <div id="rankings"></div>
            <button class="btn btn-secondary" id="shuffle-btn">🎲 Перемешать</button>
            <button class="btn btn-primary" id="vote-btn">✅ Проголосовать</button>
            <button class="btn btn-secondary" id="refresh-btn">🔄 Обновить результаты</button>
            <button class="btn btn-secondary" id="back-from-vote-btn" style="margin-top:16px;">🏠 На главную</button>
        </div>

        <!-- Экран результатов -->
        <div id="results-screen" class="hidden">
            <h1>🏆 Результаты</h1>
            <div id="results-display"></div>
            <button class="btn btn-share" id="share-results-btn">📤 Поделиться результатами</button>
            <button class="btn btn-secondary" id="refresh-results-btn">🔄 Обновить</button>
            <button class="btn btn-secondary" id="new-poll-btn">➕ Новый опрос</button>
        </div>

        <!-- Загрузчик -->
        <div id="loader" class="hidden" style="text-align:center;padding:40px;">
            <div class="loading-spinner"></div>
            <p style="color:rgba(255,255,255,0.6); margin-top: 12px;">
                Загрузка<span id="loader-dots">...</span>
            </p>
        </div>
    </div>

    <script>
    (function() {
        'use strict';

        // ============== КОНФИГУРАЦИЯ ==============
        var GAS_URL = 'https://script.google.com/macros/s/AKfycbyzPrwNCNggK6YD7KRlC3b6NMZ-YmjpKFIxYc21OPdhYhQvWII77f8BQDBcVbqFnoI7cg/exec';
        var BOT_USERNAME = 'FairChoiceBot';
        var WEBAPP_URL = 'https://eavos.github.io/fairchoice-lite/';
        var MAX_RETRIES = 3;
        var RETRY_DELAY = 2000;

        // ============== ИНИЦИАЛИЗАЦИЯ ==============
        var webApp;
        try {
            webApp = window.Telegram.WebApp;
            webApp.ready();
            webApp.expand();
        } catch(e) {
            webApp = {
                initDataUnsafe: {},
                ready: function(){},
                expand: function(){},
                openTelegramLink: function(url){ window.open(url, '_blank'); },
                openLink: function(url){ window.open(url, '_blank'); },
                showPopup: function(opts){ 
                    if (opts && opts.message) {
                        var msg = opts.title ? opts.title + '\n\n' + opts.message : opts.message;
                        alert(msg);
                    }
                },
                sendData: function(data){}
            };
        }

        var currentPollId = null;
        var currentPoll = null;
        var currentOptions = [];
        var loaderInterval = null;

        // ============== УТИЛИТЫ ==============
        function getUserId() {
            var uid = webApp.initDataUnsafe && webApp.initDataUnsafe.user && webApp.initDataUnsafe.user.id;
            if (uid) return uid.toString();
            uid = localStorage.getItem('fc_user_id');
            if (!uid) {
                uid = 'anon_' + Math.random().toString(36).substr(2, 9);
                localStorage.setItem('fc_user_id', uid);
            }
            return uid;
        }

        var userId = getUserId();

        function showMessage(type, msg) {
            var el = document.getElementById(type);
            if (!el) return;
            el.textContent = msg;
            el.classList.add('show');
            setTimeout(function() { el.classList.remove('show'); }, 4000);
        }

        function showError(msg) { showMessage('error', msg); }
        function showSuccess(msg) { showMessage('success', msg); }

        function showScreen(id) {
            ['home-screen', 'created-screen', 'vote-screen', 'results-screen', 'loader'].forEach(function(s) {
                document.getElementById(s).classList.add('hidden');
            });
            document.getElementById(id).classList.remove('hidden');
            
            if (id !== 'loader' && loaderInterval) {
                clearInterval(loaderInterval);
                loaderInterval = null;
            }
        }

        function showLoader() {
            showScreen('loader');
            var dots = document.getElementById('loader-dots');
            if (dots) {
                var count = 0;
                if (loaderInterval) clearInterval(loaderInterval);
                loaderInterval = setInterval(function() {
                    count = (count + 1) % 4;
                    dots.textContent = '.'.repeat(count);
                }, 500);
            }
        }

        function jsonp(url, callback) {
            var cbName = 'fc_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5);
            
            window[cbName] = function(data) {
                callback(null, data);
                delete window[cbName];
            };
            
            var separator = url.indexOf('?') === -1 ? '?' : '&';
            var scriptUrl = url + separator + 'callback=' + cbName;
            
            var script = document.createElement('script');
            script.src = scriptUrl;
            script.onerror = function() {
                callback(new Error('Network error'), null);
                delete window[cbName];
                document.head.removeChild(script);
            };
            document.head.appendChild(script);
        }

        // ============== ПРОВЕРКА ПАРАМЕТРОВ ==============
        function checkStartParam() {
            var pollId = null;
            
            // 1. Параметр poll (новый формат)
            try {
                var urlParams = new URLSearchParams(window.location.search);
                pollId = urlParams.get('poll');
            } catch(e) {}
            
            // 2. Параметр startapp из Telegram
            if (!pollId) {
                try {
                    if (webApp && webApp.initDataUnsafe && webApp.initDataUnsafe.startapp) {
                        pollId = webApp.initDataUnsafe.startapp.replace('poll_', '');
                    }
                } catch(e) {}
            }
            
            // 3. tgWebAppData
            if (!pollId) {
                try {
                    var hash = window.location.hash;
                    if (hash) {
                        var hashParams = new URLSearchParams(hash.substring(1));
                        var tgData = hashParams.get('tgWebAppData');
                        if (tgData) {
                            var decoded = decodeURIComponent(tgData);
                            var dataParams = new URLSearchParams(decoded);
                            var startapp = dataParams.get('startapp');
                            if (startapp) pollId = startapp.replace('poll_', '');
                        }
                    }
                } catch(e) {}
            }
            
            // 4. Прямой парсинг URL
            if (!pollId) {
                try {
                    var match = window.location.href.match(/startapp=([^&]+)/);
                    if (match) pollId = match[1].replace('poll_', '');
                } catch(e) {}
            }
            
            if (pollId) {
                pollId = pollId.trim().replace(/[^a-zA-Z0-9]/g, '');
                if (pollId) loadPoll(pollId);
            }
        }

        // ============== ЗАГРУЗКА ОПРОСА ==============
        function loadPoll(pollId) {
            showLoader();
            jsonp(GAS_URL + '?action=getPoll&pollId=' + pollId, function(err, data) {
                if (err || !data || !data.options) {
                    showScreen('home-screen');
                    showError('Опрос не найден или устарел');
                    return;
                }
                currentPoll = data;
                currentPollId = pollId;
                currentOptions = data.options.slice();
                document.getElementById('question-display').textContent = data.question;
                renderRankings();
                showScreen('vote-screen');
            });
        }

        // ============== СОЗДАНИЕ ОПРОСА ==============
        function createPoll(retryCount) {
            retryCount = retryCount || 0;
            
            var question = document.getElementById('question').value.trim();
            var rawOptions = document.getElementById('options').value.trim();
            
            if (!question) { showError('Введите вопрос'); return; }
            if (!rawOptions) { showError('Введите варианты ответов'); return; }
            
            currentOptions = rawOptions.split(/[,\n]/)
                .map(function(o) { return o.trim(); })
                .filter(function(o) { return o.length > 0; });
            
            if (currentOptions.length < 2) { 
                showError('Нужно минимум 2 варианта'); 
                return; 
            }
            
            if (currentOptions.length > 3) {
                var totalOptions = rawOptions.split(/[,\n]/).filter(function(o) { 
                    return o.trim().length > 0; 
                }).length;
                currentOptions = currentOptions
                    .sort(function() { return Math.random() - 0.5; })
                    .slice(0, 3);
                showSuccess('Выбраны 3 случайных варианта из ' + totalOptions);
            }
            
            showLoader();
            
            var params = new URLSearchParams({
                action: 'create',
                question: question,
                options: JSON.stringify(currentOptions),
                userId: userId
            });
            
            jsonp(GAS_URL + '?' + params.toString(), function(err, data) {
                if (err || !data || !data.pollId) {
                    if (retryCount < MAX_RETRIES) {
                        showError('Повторная попытка (' + (retryCount + 1) + '/' + MAX_RETRIES + ')...');
                        setTimeout(function() { createPoll(retryCount + 1); }, RETRY_DELAY);
                    } else {
                        showScreen('home-screen');
                        showError('Сервер временно недоступен. Попробуйте позже.');
                    }
                    return;
                }
                
                currentPollId = data.pollId;
                currentPoll = data;
                
                // Прямая ссылка (работает всегда)
                var directLink = WEBAPP_URL + '?poll=' + data.pollId;
                document.getElementById('share-link-text').textContent = directLink;
                
                showScreen('created-screen');
                showSuccess('Опрос успешно создан!');
            });
        }

        // ============== РАНЖИРОВАНИЕ ==============
        function renderRankings() {
            var container = document.getElementById('rankings');
            var medals = ['🥇', '🥈', '🥉'];
            
            container.innerHTML = currentOptions.map(function(option, index) {
                var upDisabled = index === 0 ? ' disabled' : '';
                var downDisabled = index === currentOptions.length - 1 ? ' disabled' : '';
                
                return '<div class="poll-card" style="display:flex;align-items:center;gap:12px;">' +
                    '<div style="display:flex;flex-direction:column;gap:4px;">' +
                    '<button class="sort-btn" onclick="window.fcMoveUp(' + index + ')"' + upDisabled + '>▲</button>' +
                    '<button class="sort-btn" onclick="window.fcMoveDown(' + index + ')"' + downDisabled + '>▼</button>' +
                    '</div>' +
                    '<span style="flex:1;">' + medals[index] + ' ' + option + '</span>' +
                    '</div>';
            }).join('');
        }

        window.fcMoveUp = function(index) {
            if (index === 0) return;
            var temp = currentOptions[index];
            currentOptions[index] = currentOptions[index - 1];
            currentOptions[index - 1] = temp;
            renderRankings();
        };

        window.fcMoveDown = function(index) {
            if (index === currentOptions.length - 1) return;
            var temp = currentOptions[index];
            currentOptions[index] = currentOptions[index + 1];
            currentOptions[index + 1] = temp;
            renderRankings();
        };

        function shuffleOptions() {
            currentOptions = currentOptions.sort(function() { return Math.random() - 0.5; });
            renderRankings();
        }

        // ============== ГОЛОСОВАНИЕ ==============
        function submitVote(retryCount) {
            retryCount = retryCount || 0;
            showLoader();
            
            var rankings = {};
            currentOptions.forEach(function(option, sortedIndex) {
                var originalIndex = currentPoll.options.indexOf(option);
                if (originalIndex === -1) originalIndex = sortedIndex;
                
                if (sortedIndex === 0) rankings.first = originalIndex;
                if (sortedIndex === 1) rankings.second = originalIndex;
                if (sortedIndex === 2) rankings.third = originalIndex;
            });
            
            var params = new URLSearchParams({
                action: 'vote',
                pollId: currentPollId,
                userId: userId,
                rankings: JSON.stringify(rankings)
            });
            
            jsonp(GAS_URL + '?' + params.toString(), function(err, data) {
                if (err || !data || !data.scores) {
                    if (retryCount < MAX_RETRIES) {
                        showError('Повторная попытка (' + (retryCount + 1) + '/' + MAX_RETRIES + ')...');
                        setTimeout(function() { submitVote(retryCount + 1); }, RETRY_DELAY);
                    } else {
                        showScreen('vote-screen');
                        showError('Сервер временно недоступен. Попробуйте позже.');
                    }
                    return;
                }
                
                currentPoll = data;
                renderResults();
                showScreen('results-screen');
            });
        }

        // ============== ОБНОВЛЕНИЕ РЕЗУЛЬТАТОВ ==============
        function refreshResults() {
            if (!currentPollId) return;
            showLoader();
            
            jsonp(GAS_URL + '?action=getPoll&pollId=' + currentPollId, function(err, data) {
                if (err || !data) {
                    showError('Не удалось обновить результаты');
                    showScreen('results-screen');
                    return;
                }
                currentPoll = data;
                renderResults();
                showScreen('results-screen');
            });
        }

        // ============== ОТОБРАЖЕНИЕ РЕЗУЛЬТАТОВ ==============
        function renderResults() {
            var container = document.getElementById('results-display');
            
            if (!currentPoll || !currentPoll.scores) {
                container.innerHTML = '<p style="text-align:center;">Нет результатов</p>';
                return;
            }
            
            var sorted = Object.entries(currentPoll.scores)
                .sort(function(a, b) { return b[1] - a[1]; });
            
            var medals = ['🥇', '🥈', '🥉'];
            
            var html = sorted.map(function(entry, index) {
                var optionIndex = parseInt(entry[0]);
                var optionText = currentPoll.options[optionIndex] || 'Вариант ' + (optionIndex + 1);
                var score = entry[1];
                return '<div class="poll-card">' + 
                    medals[index] + ' <strong>' + optionText + '</strong><br>' +
                    '<span style="font-size:14px;color:rgba(255,255,255,0.7);">' + score + ' очков</span>' +
                    '</div>';
            }).join('');
            
            html += '<p class="voter-count">👥 Проголосовало: ' + 
                (currentPoll.totalVoters || 0) + ' человек</p>';
            
            container.innerHTML = html;
        }

        // ============== ШЕРИНГ ==============
        function sharePollLink() {
            var link = document.getElementById('share-link-text').textContent;
            
            if (!link || link.indexOf('undefined') !== -1 || !currentPoll) {
                showError('Сначала создайте опрос');
                return;
            }
            
            var shareText = '🗳️ ' + currentPoll.question + '\n\n' +
                '🔗 Перейди по ссылке чтобы проголосовать:\n' + link + '\n\n' +
                '📱 Ссылка откроется в браузере, нажми "Открыть в Telegram"';
            
            // Пробуем поделиться через Telegram
            var shareUrl = 'https://t.me/share/url?text=' + encodeURIComponent(shareText) + 
                '&url=' + encodeURIComponent(link);
            
            try {
                if (webApp && typeof webApp.openTelegramLink === 'function') {
                    webApp.openTelegramLink(shareUrl);
                    return;
                }
            } catch(e) {}
            
            try {
                if (webApp && typeof webApp.openLink === 'function') {
                    webApp.openLink(shareUrl);
                    return;
                }
            } catch(e) {}
            
            // Fallback: копируем в буфер
            copyToClipboard(shareText);
        }

        function shareResults() {
            if (!currentPoll || !currentPollId) {
                showError('Нет результатов для шаринга');
                return;
            }
            
            var link = WEBAPP_URL + '?poll=' + currentPollId;
            
            var sorted = Object.entries(currentPoll.scores)
                .sort(function(a, b) { return b[1] - a[1]; });
            
            var medals = ['🥇', '🥈', '🥉'];
            var resultsText = sorted.map(function(entry, index) {
                var optionText = currentPoll.options[parseInt(entry[0])] || 'Вариант';
                return medals[index] + ' ' + optionText + ' — ' + entry[1] + ' очков';
            }).join('\n');
            
            var shareText = '🏆 Результаты: ' + currentPoll.question + '\n\n' + 
                resultsText + '\n\n' +
                '👥 Проголосовало: ' + (currentPoll.totalVoters || 0) + ' человек\n\n' +
                '🔗 Голосовать: ' + link;
            
            var shareUrl = 'https://t.me/share/url?text=' + encodeURIComponent(shareText) + 
                '&url=' + encodeURIComponent(link);
            
            try {
                if (webApp && typeof webApp.openTelegramLink === 'function') {
                    webApp.openTelegramLink(shareUrl);
                    return;
                }
            } catch(e) {}
            
            try {
                if (webApp && typeof webApp.openLink === 'function') {
                    webApp.openLink(shareUrl);
                    return;
                }
            } catch(e) {}
            
            copyToClipboard(shareText);
        }

        function copyToClipboard(text) {
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(function() {
                    showCopySuccess();
                }).catch(function() {
                    fallbackCopy(text);
                });
            } else {
                fallbackCopy(text);
            }
        }

        function fallbackCopy(text) {
            var textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.top = '0';
            textarea.style.left = '0';
            textarea.style.opacity = '0';
            document.body.appendChild(textarea);
            textarea.select();
            
            try {
                document.execCommand('copy');
                showCopySuccess();
            } catch(e) {
                showError('Не удалось скопировать. Скопируйте ссылку вручную.');
            }
            
            document.body.removeChild(textarea);
        }

        function showCopySuccess() {
            if (webApp && typeof webApp.showPopup === 'function') {
                webApp.showPopup({
                    title: '📋 Ссылка скопирована!',
                    message: 'Отправьте её в чат Telegram, чтобы поделиться опросом.',
                    buttons: [{type: 'ok'}]
                });
            } else {
                showSuccess('📋 Ссылка скопирована! Отправьте её в чат Telegram.');
            }
        }

        // ============== ПЕРЕХОД В TELEGRAM ==============
        function openInTelegram() {
            if (!currentPollId) return;
            
            // Открываем бота в Telegram
            var telegramUrl = 'https://t.me/' + BOT_USERNAME;
            
            try {
                if (webApp && typeof webApp.openTelegramLink === 'function') {
                    webApp.openTelegramLink(telegramUrl);
                } else {
                    window.open(telegramUrl, '_blank');
                }
            } catch(e) {
                window.open(telegramUrl, '_blank');
            }
        }

        // ============== ОБРАБОТЧИКИ СОБЫТИЙ ==============
        document.getElementById('create-btn').addEventListener('click', function() {
            createPoll(0);
        });

        document.getElementById('shuffle-btn').addEventListener('click', shuffleOptions);

        document.getElementById('vote-btn').addEventListener('click', function() {
            submitVote(0);
        });

        document.getElementById('share-link-btn').addEventListener('click', sharePollLink);

        document.getElementById('share-results-btn').addEventListener('click', shareResults);

        document.getElementById('refresh-btn').addEventListener('click', refreshResults);

        document.getElementById('refresh-results-btn').addEventListener('click', refreshResults);

        document.getElementById('vote-now-btn').addEventListener('click', function() {
            if (!currentPoll) return;
            document.getElementById('question-display').textContent = currentPoll.question;
            currentOptions = currentPoll.options.slice();
            renderRankings();
            showScreen('vote-screen');
        });

        document.getElementById('back-home-btn').addEventListener('click', function() {
            showScreen('home-screen');
        });

        document.getElementById('back-from-vote-btn').addEventListener('click', function() {
            showScreen('home-screen');
        });

        document.getElementById('new-poll-btn').addEventListener('click', function() {
            currentPollId = null;
            currentPoll = null;
            currentOptions = [];
            showScreen('home-screen');
        });

        // Запуск
        checkStartParam();
    })();
    </script>
</body>
</html>
