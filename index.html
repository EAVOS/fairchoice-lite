<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FairChoice Lite</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #ffffff;
            min-height: 100vh;
            padding: 16px;
        }
        #app { max-width: 400px; margin: 0 auto; }
        h1 { font-size: 24px; font-weight: 700; margin-bottom: 16px; text-align: center; }
        .input-field {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            margin: 8px 0;
            font-size: 16px;
            background: rgba(255,255,255,0.1);
            color: #fff;
        }
        .input-field::placeholder { color: rgba(255,255,255,0.4); }
        textarea.input-field { resize: vertical; min-height: 60px; }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin: 8px 0;
            transition: all 0.15s ease;
        }
        .btn:active { transform: scale(0.97); opacity: 0.85; }
        .btn-primary { background: #39ff14; color: #1a1a2e; }
        .btn-secondary { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2); }
        .btn-share { background: rgba(255,215,0,0.2); color: #ffd700; border: 1px solid rgba(255,215,0,0.3); }
        .poll-card { background: rgba(255,255,255,0.08); border-radius: 12px; padding: 14px; margin: 8px 0; font-size: 16px; }
        .error-msg { color: #ff4444; text-align: center; padding: 8px; display: none; font-size: 14px; }
        .error-msg.show { display: block; }
        .voter-count { text-align: center; color: rgba(255,255,255,0.5); font-size: 14px; margin-top: 12px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="app">
        <div id="home-screen">
            <h1>📊 FairChoice Lite</h1>
            <input type="text" id="question" class="input-field" placeholder="Что выбираем?">
            <textarea id="options" class="input-field" placeholder="Пицца, Суши, Бургер" rows="3"></textarea>
            <button class="btn btn-primary" onclick="createPoll()">🚀 Быстрый выбор</button>
            <p id="error" class="error-msg"></p>
        </div>
        <div id="vote-screen" class="hidden">
            <h1 id="question-display"></h1>
            <div id="rankings"></div>
            <button class="btn btn-secondary" onclick="shuffle()">🎲 Перемешать</button>
            <button class="btn btn-primary" onclick="submitVote()">✅ Проголосовать</button>
        </div>
        <div id="results-screen" class="hidden">
            <h1>🏆 Результаты</h1>
            <div id="results-display"></div>
            <button class="btn btn-share" onclick="shareResults()">📤 Поделиться</button>
            <button class="btn btn-secondary" onclick="location.reload()">🔄 Новый опрос</button>
        </div>
        <div id="loader" class="hidden" style="text-align:center;padding:40px;">
            <p style="color:rgba(255,255,255,0.6);">Загрузка...</p>
        </div>
    </div>
    <script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbzhGa9stV7xabSoaujaEGtM6zq57Ndu_b0vxVX_O33gNshk1YuwEWBxE6hrwylZmhtKGQ/exec';
    const webApp = window.Telegram.WebApp;
    webApp.ready();
    webApp.expand();

    let currentPoll = null;
    let currentOptions = [];

    function getUserId() {
        let userId = webApp.initDataUnsafe?.user?.id;
        if (userId) return userId.toString();
        userId = localStorage.getItem('fc_user_id');
        if (!userId) {
            userId = 'anon_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('fc_user_id', userId);
        }
        return userId;
    }

    const userId = getUserId();

    function showError(msg) {
        const error = document.getElementById('error');
        error.textContent = msg;
        error.classList.add('show');
        setTimeout(function() { error.classList.remove('show'); }, 3000);
    }

    function createPoll() {
        const question = document.getElementById('question').value.trim();
        const optionsRaw = document.getElementById('options').value.trim();
        if (!question || !optionsRaw) { showError('Заполни оба поля'); return; }
        currentOptions = optionsRaw.split(/[,\n]/).map(function(o) { return o.trim(); }).filter(function(o) { return o.length > 0; });
        if (currentOptions.length < 2) { showError('Нужно минимум 2 варианта'); return; }
        if (currentOptions.length > 3) {
            currentOptions = currentOptions.sort(function() { return Math.random() - 0.5; }).slice(0, 3);
        }
        document.getElementById('question-display').textContent = question;
        renderRankings();
        document.getElementById('home-screen').classList.add('hidden');
        document.getElementById('vote-screen').classList.remove('hidden');
    }

    function renderRankings() {
        const container = document.getElementById('rankings');
        const medals = ['🥇', '🥈', '🥉'];
        container.innerHTML = currentOptions.map(function(opt, i) {
            return '<div class="poll-card">' + (medals[i] || '') + ' ' + opt + '</div>';
        }).join('');
    }

    function shuffle() {
        currentOptions = currentOptions.sort(function() { return Math.random() - 0.5; });
        renderRankings();
    }

    function submitVote() {
        const loader = document.getElementById('loader');
        const voteScreen = document.getElementById('vote-screen');
        voteScreen.classList.add('hidden');
        loader.classList.remove('hidden');

        const question = document.getElementById('question-display').textContent;
        const callbackName = 'fc_' + Date.now();
        
        window[callbackName] = function(data) {
            currentPoll = data;
            renderResults();
            loader.classList.add('hidden');
            document.getElementById('results-screen').classList.remove('hidden');
            delete window[callbackName];
        };
        
        const params = new URLSearchParams({
            action: 'createAndVote',
            question: question,
            options: JSON.stringify(currentOptions),
            userId: userId,
            rankings: JSON.stringify({ first: 0, second: 1, third: 2 }),
            callback: callbackName
        });
        
        const script = document.createElement('script');
        script.src = GAS_URL + '?' + params.toString();
        script.onerror = function() {
            loader.classList.add('hidden');
            voteScreen.classList.remove('hidden');
            showError('Сервер перегружен. Попробуй через минуту.');
            delete window[callbackName];
        };
        document.head.appendChild(script);
    }

    function renderResults() {
        const container = document.getElementById('results-display');
        if (!currentPoll || !currentPoll.scores) { container.innerHTML = '<p>Нет результатов</p>'; return; }
        const sorted = Object.entries(currentPoll.scores).sort(function(a, b) { return b[1] - a[1]; });
        const medals = ['🥇', '🥈', '🥉'];
        container.innerHTML = sorted.map(function(entry, i) {
            const idx = entry[0]; const score = entry[1]; const option = currentPoll.options[idx];
            return '<div class="poll-card">' + (medals[i] || '') + ' ' + option + ' — <strong>' + score + ' очков</strong></div>';
        }).join('');
        container.innerHTML += '<p class="voter-count">👥 Проголосовало: ' + (currentPoll.totalVoters || 0) + ' человек</p>';
    }

    function shareResults() {
        if (!currentPoll) return;
        const sorted = Object.entries(currentPoll.scores).sort(function(a, b) { return b[1] - a[1]; });
        const medals = ['🥇', '🥈', '🥉'];
        const text = sorted.map(function(entry, i) {
            const idx = entry[0]; const score = entry[1]; const option = currentPoll.options[idx];
            return (medals[i] || '') + ' ' + option + ' — ' + score + ' очков';
        }).join('\n');
        const shareText = '🗳️ ' + currentPoll.question + '\n\n' + text + '\n\nГолосовать: t.me/FairChoiceBot?startapp=poll_' + currentPoll.pollId;
        webApp.openTelegramLink('https://t.me/share/url?text=' + encodeURIComponent(shareText));
    }
    </script>
</body>
</html>
