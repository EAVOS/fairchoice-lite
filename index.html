<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FairChoice Lite</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; color: #ffffff; min-height: 100vh; padding: 16px; }
        #app { max-width: 400px; margin: 0 auto; }
        h1 { font-size: 24px; font-weight: 700; margin-bottom: 16px; text-align: center; }
        .input-field { width: 100%; padding: 12px; border-radius: 8px; border: none; margin: 8px 0; font-size: 16px; background: rgba(255,255,255,0.1); color: #fff; }
        .input-field::placeholder { color: rgba(255,255,255,0.4); }
        textarea.input-field { resize: vertical; min-height: 60px; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; margin: 8px 0; transition: all 0.15s ease; }
        .btn:active { transform: scale(0.97); opacity: 0.85; }
        .btn-primary { background: #39ff14; color: #1a1a2e; }
        .btn-secondary { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2); }
        .btn-share { background: rgba(255,215,0,0.2); color: #ffd700; border: 1px solid rgba(255,215,0,0.3); }
        .poll-card { background: rgba(255,255,255,0.08); border-radius: 12px; padding: 14px; margin: 8px 0; font-size: 16px; }
        .error-msg { color: #ff4444; text-align: center; padding: 8px; display: none; font-size: 14px; }
        .error-msg.show { display: block; }
        .voter-count { text-align: center; color: rgba(255,255,255,0.5); font-size: 14px; margin-top: 12px; }
        .hidden { display: none !important; }
        .sort-btn { background: none; border: none; color: white; cursor: pointer; font-size: 18px; padding: 2px 6px; }
        .sort-btn:disabled { opacity: 0.2; cursor: default; }
        .share-link { background: rgba(255,255,255,0.1); padding: 12px; border-radius: 8px; word-break: break-all; font-size: 14px; margin: 12px 0; text-align: center; }
    </style>
</head>
<body>
    <div id="app">
        <div id="home-screen">
            <h1>📊 FairChoice Lite</h1>
            <input type="text" id="question" class="input-field" placeholder="Что выбираем?">
            <textarea id="options" class="input-field" placeholder="Пицца, Суши, Бургер" rows="3"></textarea>
            <button class="btn btn-primary" id="create-btn">🚀 Создать опрос</button>
            <p id="error" class="error-msg"></p>
        </div>

        <div id="created-screen" class="hidden">
            <h1>✅ Опрос создан!</h1>
            <p style="text-align:center;">Поделитесь ссылкой с участниками:</p>
            <div class="share-link" id="share-link-text"></div>
            <button class="btn btn-share" id="share-link-btn">📤 Поделиться ссылкой</button>
            <button class="btn btn-primary" id="vote-now-btn">🗳️ Проголосовать</button>
        </div>

        <div id="vote-screen" class="hidden">
            <h1 id="question-display"></h1>
            <div id="rankings"></div>
            <button class="btn btn-secondary" id="shuffle-btn">🎲 Перемешать</button>
            <button class="btn btn-primary" id="vote-btn">✅ Проголосовать</button>
            <button class="btn btn-secondary" id="refresh-btn">🔄 Обновить результаты</button>
        </div>

        <div id="results-screen" class="hidden">
            <h1>🏆 Результаты</h1>
            <div id="results-display"></div>
            <button class="btn btn-share" id="share-results-btn">📤 Поделиться</button>
            <button class="btn btn-secondary" id="refresh-results-btn">🔄 Обновить</button>
            <button class="btn btn-secondary" id="new-poll-btn">🔄 Новый опрос</button>
        </div>

        <div id="loader" class="hidden" style="text-align:center;padding:40px;">
            <p style="color:rgba(255,255,255,0.6);">Загрузка...</p>
        </div>
    </div>

    <script>
    // Ждём загрузку Telegram WebApp API
    function initApp() {
        if (!window.Telegram || !window.Telegram.WebApp) {
            // Мок для браузера
            window.Telegram = {
                WebApp: {
                    initDataUnsafe: {},
                    ready: function () {},
                    expand: function () {},
                    openTelegramLink: function (url) { window.open(url, '_blank'); },
                    openLink: function (url) { window.open(url, '_blank'); },
                    showPopup: function (opts) { alert(opts.message); },
                    sendData: function (data) { console.log('sendData:', data); }
                }
            };
        }

        var GAS_URL = 'https://script.google.com/macros/s/AKfycbx3x90q1MTHl7ZUdJJeMAf4kK5gXW7Xic7qUuR9MlFKECrS8r9lYT_LaVVis7nAUwFE/exec';
        var webApp = window.Telegram.WebApp;
        webApp.ready();
        webApp.expand();

        var currentPollId = null;
        var currentPoll = null;
        var currentOptions = [];

        function getUserId() {
            var uid = webApp.initDataUnsafe && webApp.initDataUnsafe.user && webApp.initDataUnsafe.user.id;
            if (uid) return uid.toString();
            uid = localStorage.getItem('fc_user_id');
            if (!uid) {
                uid = 'anon_' + Math.random().toString(36).substr(2, 9);
                localStorage.setItem('fc_user_id', uid);
            }
            return uid;
        }

        var userId = getUserId();

        function showError(msg) {
            var e = document.getElementById('error');
            e.textContent = msg;
            e.classList.add('show');
            setTimeout(function () { e.classList.remove('show'); }, 3000);
        }

        function showScreen(id) {
            ['home-screen', 'created-screen', 'vote-screen', 'results-screen', 'loader'].forEach(function (s) {
                document.getElementById(s).classList.add('hidden');
            });
            document.getElementById(id).classList.remove('hidden');
        }

        function checkStartParam() {
            var startapp = webApp.initDataUnsafe && webApp.initDataUnsafe.startapp;
            if (!startapp) {
                var urlParams = new URLSearchParams(window.location.search);
                startapp = urlParams.get('startapp');
            }
            if (startapp && startapp.startsWith('poll_')) {
                currentPollId = startapp.replace('poll_', '');
                loadPoll(currentPollId);
            }
        }

        function loadPoll(pollId) {
            showScreen('loader');
            var cb = 'fc_load_' + Date.now();
            window[cb] = function (data) {
                if (!data || !data.options) {
                    showScreen('home-screen');
                    showError('Опрос не найден');
                    return;
                }
                currentPoll = data;
                currentPollId = pollId;
                currentOptions = data.options.slice();
                document.getElementById('question-display').textContent = data.question;
                renderRankings();
                showScreen('vote-screen');
                delete window[cb];
            };
            var s = document.createElement('script');
            s.src = GAS_URL + '?action=getPoll&pollId=' + pollId + '&callback=' + cb;
            s.onerror = function () { showScreen('home-screen'); showError('Сервер перегружен'); delete window[cb]; };
            document.head.appendChild(s);
        }

        function createPoll() {
            var q = document.getElementById('question').value.trim();
            var r = document.getElementById('options').value.trim();
            if (!q || !r) { showError('Заполни оба поля'); return; }
            currentOptions = r.split(/[,\n]/).map(function (o) { return o.trim(); }).filter(function (o) { return o.length > 0; });
            if (currentOptions.length < 2) { showError('Нужно минимум 2 варианта'); return; }
            if (currentOptions.length > 3) {
                currentOptions = currentOptions.sort(function () { return Math.random() - 0.5; }).slice(0, 3);
            }
            showScreen('loader');
            var cb = 'fc_create_' + Date.now();
            window[cb] = function (data) {
                if (!data || !data.pollId) {
                    showScreen('home-screen');
                    showError('Ошибка сервера. Попробуйте позже.');
                    delete window[cb];
                    return;
                }
                currentPollId = data.pollId;
                currentPoll = data;
                var link = 'https://t.me/FairChoiceBot?startapp=poll_' + data.pollId;
                document.getElementById('share-link-text').textContent = link;
                showScreen('created-screen');
                delete window[cb];
            };
            var p = new URLSearchParams({ action: 'create', question: q, options: JSON.stringify(currentOptions), userId: userId, callback: cb });
            var s = document.createElement('script');
            s.src = GAS_URL + '?' + p.toString();
            s.onerror = function () { showScreen('home-screen'); showError('Сервер перегружен. Попробуй позже.'); delete window[cb]; };
            document.head.appendChild(s);
        }

        function renderRankings() {
            var c = document.getElementById('rankings');
            var medals = ['🥇', '🥈', '🥉'];
            c.innerHTML = currentOptions.map(function (o, i) {
                var upDisabled = i === 0 ? ' disabled' : '';
                var downDisabled = i === currentOptions.length - 1 ? ' disabled' : '';
                return '<div class="poll-card" style="display:flex;align-items:center;gap:8px;">' +
                    '<div style="display:flex;flex-direction:column;gap:2px;">' +
                    '<button onclick="moveUp(' + i + ')"' + upDisabled + ' class="sort-btn">▲</button>' +
                    '<button onclick="moveDown(' + i + ')"' + downDisabled + ' class="sort-btn">▼</button>' +
                    '</div>' +
                    '<span>' + (medals[i] || '') + ' ' + o + '</span>' +
                    '</div>';
            }).join('');
        }

        window.moveUp = function(index) {
            if (index === 0) return;
            var temp = currentOptions[index];
            currentOptions[index] = currentOptions[index - 1];
            currentOptions[index - 1] = temp;
            renderRankings();
        };

        window.moveDown = function(index) {
            if (index === currentOptions.length - 1) return;
            var temp = currentOptions[index];
            currentOptions[index] = currentOptions[index + 1];
            currentOptions[index + 1] = temp;
            renderRankings();
        };

        function shuffle() {
            currentOptions = currentOptions.sort(function () { return Math.random() - 0.5; });
            renderRankings();
        }

        function submitVote() {
            showScreen('loader');
            var rankings = {};
            currentOptions.forEach(function (opt, i) {
                var originalIndex = currentPoll.options.indexOf(opt);
                if (originalIndex === -1) originalIndex = i;
                if (i === 0) rankings.first = originalIndex;
                if (i === 1) rankings.second = originalIndex;
                if (i === 2) rankings.third = originalIndex;
            });
            var cb = 'fc_vote_' + Date.now();
            window[cb] = function (data) {
                currentPoll = data;
                renderResults();
                showScreen('results-screen');
                delete window[cb];
            };
            var p = new URLSearchParams({ action: 'vote', pollId: currentPollId, userId: userId, rankings: JSON.stringify(rankings), callback: cb });
            var s = document.createElement('script');
            s.src = GAS_URL + '?' + p.toString();
            s.onerror = function () { showScreen('vote-screen'); showError('Сервер перегружен'); delete window[cb]; };
            document.head.appendChild(s);
        }

        function refreshResults() {
            showScreen('loader');
            var cb = 'fc_refresh_' + Date.now();
            window[cb] = function (data) { currentPoll = data; renderResults(); showScreen('results-screen'); delete window[cb]; };
            var s = document.createElement('script');
            s.src = GAS_URL + '?action=getPoll&pollId=' + currentPollId + '&callback=' + cb;
            s.onerror = function () { showError('Не удалось обновить'); delete window[cb]; };
            document.head.appendChild(s);
        }

        function renderResults() {
            var c = document.getElementById('results-display');
            if (!currentPoll || !currentPoll.scores) { c.innerHTML = '<p>Нет результатов</p>'; return; }
            var sorted = Object.entries(currentPoll.scores).sort(function (a, b) { return b[1] - a[1]; });
            var medals = ['🥇', '🥈', '🥉'];
            c.innerHTML = sorted.map(function (e, i) {
                var optionText = currentPoll.options[parseInt(e[0])];
                return '<div class="poll-card">' + (medals[i] || '') + ' ' + optionText + ' — <strong>' + e[1] + ' очков</strong></div>';
            }).join('');
            c.innerHTML += '<p class="voter-count">👥 Проголосовало: ' + (currentPoll.totalVoters || 0) + ' человек</p>';
        }

        function shareLink() {
            var link = document.getElementById('share-link-text').textContent;
            if (!link || link.indexOf('undefined') !== -1) return;
            var questionText = currentPoll ? currentPoll.question : 'Голосование';
            var shareText = '🗳️ ' + questionText + '\n\nГолосуй:\n' + link;
            var shareUrl = 'https://t.me/share/url?url=' + encodeURIComponent(link) + '&text=' + encodeURIComponent(shareText);
            try { webApp.openTelegramLink(shareUrl); return; } catch (e) {}
            try { webApp.openLink(shareUrl); return; } catch (e) {}
            fallbackCopy(shareText);
        }

        function shareResults() {
            if (!currentPoll || !currentPollId) return;
            var link = 'https://t.me/FairChoiceBot?startapp=poll_' + currentPollId;
            var sorted = Object.entries(currentPoll.scores).sort(function (a, b) { return b[1] - a[1]; });
            var medals = ['🥇', '🥈', '🥉'];
            var text = sorted.map(function (e, i) { return (medals[i] || '') + ' ' + currentPoll.options[parseInt(e[0])] + ' — ' + e[1] + ' очков'; }).join('\n');
            var shareText = '🗳️ ' + currentPoll.question + '\n\n' + text + '\n\nГолосовать: ' + link;
            var shareUrl = 'https://t.me/share/url?url=' + encodeURIComponent(link) + '&text=' + encodeURIComponent(shareText);
            try { webApp.openTelegramLink(shareUrl); return; } catch (e) {}
            try { webApp.openLink(shareUrl); return; } catch (e) {}
            fallbackCopy(shareText);
        }

        function fallbackCopy(text) {
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(function () {
                    try { webApp.showPopup({ title: '📋 Скопировано!', message: 'Текст скопирован. Отправьте его в любой чат.', buttons: [{ type: 'ok' }] }); } catch (e) { alert('📋 Скопировано!'); }
                }).catch(function () { alert('Ссылка:\n\n' + text); });
            } else { alert('Ссылка:\n\n' + text); }
        }

        document.getElementById('create-btn').addEventListener('click', createPoll);
        document.getElementById('shuffle-btn').addEventListener('click', shuffle);
        document.getElementById('vote-btn').addEventListener('click', submitVote);
        document.getElementById('share-link-btn').addEventListener('click', shareLink);
        document.getElementById('share-results-btn').addEventListener('click', shareResults);
        document.getElementById('refresh-btn').addEventListener('click', refreshResults);
        document.getElementById('refresh-results-btn').addEventListener('click', refreshResults);
        document.getElementById('vote-now-btn').addEventListener('click', function () {
            if (!currentPoll) return;
            document.getElementById('question-display').textContent = currentPoll.question;
            currentOptions = currentPoll.options.slice();
            renderRankings();
            showScreen('vote-screen');
        });
        document.getElementById('new-poll-btn').addEventListener('click', function () { location.href = location.pathname; });

        checkStartParam();
    }

    // Запускаем после загрузки страницы
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initApp);
    } else {
        initApp();
    }
    </script>
</body>
</html>
