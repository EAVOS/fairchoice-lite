<!-- FairChoice Lite v16.2 - Fixed Sharing & Debug -->
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>FairChoice Lite</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background: #1a1a2e; 
            color: #ffffff; 
            min-height: 100vh; 
            padding: 16px;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        #app { max-width: 400px; margin: 0 auto; }
        h1 { font-size: 24px; font-weight: 700; margin-bottom: 16px; text-align: center; }
        
        .input-field { 
            width: 100%; 
            padding: 12px; 
            border-radius: 8px; 
            border: 1px solid rgba(255,255,255,0.1); 
            margin: 8px 0; 
            font-size: 16px; 
            background: rgba(255,255,255,0.1); 
            color: #fff;
            outline: none;
            transition: border-color 0.2s;
        }
        .input-field:focus { border-color: #39ff14; }
        .input-field::placeholder { color: rgba(255,255,255,0.4); }
        textarea.input-field { resize: vertical; min-height: 80px; }
        
        .btn { 
            width: 100%; 
            padding: 14px; 
            border: none; 
            border-radius: 12px; 
            font-size: 16px; 
            font-weight: 600; 
            cursor: pointer; 
            margin: 8px 0; 
            transition: all 0.15s ease;
            position: relative;
            overflow: hidden;
        }
        .btn:active { transform: scale(0.97); opacity: 0.85; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-primary { background: #39ff14; color: #1a1a2e; }
        .btn-secondary { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2); }
        .btn-share { background: rgba(0,136,204,0.3); color: #39ff14; border: 1px solid rgba(0,136,204,0.3); }
        
        .poll-card { 
            background: rgba(255,255,255,0.08); 
            border-radius: 12px; 
            padding: 14px; 
            margin: 8px 0; 
            font-size: 16px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        
        .error-msg { 
            color: #ff4444; 
            text-align: center; 
            padding: 12px; 
            display: none; 
            font-size: 14px;
            background: rgba(255,68,68,0.1);
            border-radius: 8px;
            margin: 8px 0;
        }
        .error-msg.show { display: block; }
        
        .success-msg { 
            color: #39ff14; 
            text-align: center; 
            padding: 12px; 
            display: none; 
            font-size: 14px;
            background: rgba(57,255,20,0.1);
            border-radius: 8px;
            margin: 8px 0;
        }
        .success-msg.show { display: block; }
        
        .voter-count { 
            text-align: center; 
            color: rgba(255,255,255,0.5); 
            font-size: 14px; 
            margin-top: 12px; 
        }
        
        .hidden { display: none !important; }
        
        .sort-btn { 
            background: rgba(255,255,255,0.15); 
            border: 1px solid rgba(255,255,255,0.1); 
            color: white; 
            cursor: pointer; 
            font-size: 16px; 
            padding: 4px 10px;
            border-radius: 6px;
            line-height: 1;
        }
        .sort-btn:disabled { opacity: 0.2; cursor: default; }
        
        .share-link-container { 
            background: rgba(255,255,255,0.1); 
            padding: 12px; 
            border-radius: 8px; 
            margin: 12px 0;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .share-link { 
            word-break: break-all; 
            font-size: 13px; 
            text-align: center;
            color: #39ff14;
            user-select: all;
            margin-bottom: 8px;
            padding: 8px;
            background: rgba(0,0,0,0.3);
            border-radius: 6px;
        }
        
        .share-link-secondary {
            word-break: break-all; 
            font-size: 11px; 
            text-align: center;
            color: rgba(255,255,255,0.5);
            user-select: all;
            padding: 8px;
            background: rgba(0,0,0,0.2);
            border-radius: 6px;
            margin-top: 8px;
        }
        
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #39ff14;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Главный экран -->
        <div id="home-screen">
            <h1>📊 FairChoice Lite</h1>
            <input type="text" id="question" class="input-field" placeholder="❓ Что выбираем? Например: Куда пойти вечером?">
            <textarea id="options" class="input-field" placeholder="📝 Варианты через запятую:&#10;Пицца, Суши, Бургер" rows="3"></textarea>
            <button class="btn btn-primary" id="create-btn">🚀 Создать опрос</button>
            <div id="error" class="error-msg"></div>
            <div id="success" class="success-msg"></div>
        </div>

        <!-- Экран "Опрос создан" -->
        <div id="created-screen" class="hidden">
            <h1>✅ Опрос создан!</h1>
            <p style="text-align:center; margin-bottom: 12px;">Поделитесь ссылкой с участниками:</p>
            <div class="share-link-container">
                <div style="margin-bottom:4px;font-size:12px;color:rgba(255,255,255,0.7);">Основная ссылка (для Telegram):</div>
                <div class="share-link" id="share-link-text"></div>
                <div style="margin-top:8px;font-size:12px;color:rgba(255,255,255,0.7);">Прямая ссылка (если основная не работает):</div>
                <div class="share-link-secondary" id="direct-link-text"></div>
            </div>
            <button class="btn btn-share" id="share-link-btn">📤 Поделиться основной ссылкой</button>
            <button class="btn btn-share" id="share-direct-btn" style="background: rgba(255,215,0,0.2); color: #ffd700; border: 1px solid rgba(255,215,0,0.3);">📤 Поделиться прямой ссылкой</button>
            <button class="btn btn-primary" id="vote-now-btn">🗳️ Проголосовать самому</button>
            <button class="btn btn-secondary" id="back-home-btn">🏠 На главную</button>
        </div>

        <!-- Экран голосования -->
        <div id="vote-screen" class="hidden">
            <h1 id="question-display"></h1>
            <p style="text-align:center; color: rgba(255,255,255,0.6); font-size: 14px; margin-bottom: 8px;">
                Расставь варианты по местам (🥇🥈🥉)
            </p>
            <div id="rankings"></div>
            <button class="btn btn-secondary" id="shuffle-btn">🎲 Перемешать</button>
            <button class="btn btn-primary" id="vote-btn">✅ Проголосовать</button>
            <button class="btn btn-secondary" id="refresh-btn">🔄 Обновить результаты</button>
        </div>

        <!-- Экран результатов -->
        <div id="results-screen" class="hidden">
            <h1>🏆 Результаты</h1>
            <div id="results-display"></div>
            <button class="btn btn-share" id="share-results-btn">📤 Поделиться результатами</button>
            <button class="btn btn-secondary" id="refresh-results-btn">🔄 Обновить</button>
            <button class="btn btn-secondary" id="new-poll-btn">➕ Новый опрос</button>
        </div>

        <!-- Загрузчик -->
        <div id="loader" class="hidden" style="text-align:center;padding:40px;">
            <div class="loading-spinner"></div>
            <p style="color:rgba(255,255,255,0.6); margin-top: 12px;">
                Загрузка<span id="loader-dots">...</span>
            </p>
        </div>
    </div>

    <script>
    (function() {
        'use strict';

        // ============== КОНФИГУРАЦИЯ ==============
        var GAS_URL = 'https://script.google.com/macros/s/AKfycbyzPrwNCNggK6YD7KRlC3b6NMZ-YmjpKFIxYc21OPdhYhQvWII77f8BQDBcVbqFnoI7cg/exec';
        var BOT_USERNAME = 'FairChoiceBot';
        var WEBAPP_URL = 'https://eavos.github.io/fairchoice-lite/';
        var MAX_RETRIES = 3;
        var RETRY_DELAY = 2000;

        // ============== ИНИЦИАЛИЗАЦИЯ ==============
        var webApp;
        try {
            webApp = window.Telegram.WebApp;
            webApp.ready();
            webApp.expand();
            console.log('Telegram WebApp initialized');
        } catch(e) {
            console.log('Telegram WebApp not available, using fallback');
            webApp = {
                initDataUnsafe: {},
                ready: function(){},
                expand: function(){},
                openTelegramLink: function(url){ 
                    console.log('Fallback openTelegramLink:', url);
                    window.open(url, '_blank'); 
                },
                openLink: function(url){ 
                    console.log('Fallback openLink:', url);
                    window.open(url, '_blank'); 
                },
                showPopup: function(opts){ 
                    console.log('Fallback showPopup:', opts);
                    if (opts && opts.message) {
                        var msg = opts.title ? opts.title + '\n\n' + opts.message : opts.message;
                        alert(msg);
                    }
                },
                sendData: function(data){ console.log('sendData:', data); }
            };
        }

        var currentPollId = null;
        var currentPoll = null;
        var currentOptions = [];
        var loaderInterval = null;

        // ============== УТИЛИТЫ ==============
        function getUserId() {
            var uid = webApp.initDataUnsafe && webApp.initDataUnsafe.user && webApp.initDataUnsafe.user.id;
            if (uid) {
                console.log('User ID from Telegram:', uid);
                return uid.toString();
            }
            uid = localStorage.getItem('fc_user_id');
            if (!uid) {
                uid = 'anon_' + Math.random().toString(36).substr(2, 9);
                localStorage.setItem('fc_user_id', uid);
                console.log('Generated new user ID:', uid);
            }
            return uid;
        }

        var userId = getUserId();
        console.log('Current userId:', userId);

        function showMessage(type, msg) {
            console.log('Show ' + type + ':', msg);
            var el = document.getElementById(type);
            if (!el) return;
            el.textContent = msg;
            el.classList.add('show');
            setTimeout(function() { el.classList.remove('show'); }, 4000);
        }

        function showError(msg) { showMessage('error', msg); }
        function showSuccess(msg) { showMessage('success', msg); }

        function showScreen(id) {
            console.log('Switching to screen:', id);
            ['home-screen', 'created-screen', 'vote-screen', 'results-screen', 'loader'].forEach(function(s) {
                document.getElementById(s).classList.add('hidden');
            });
            document.getElementById(id).classList.remove('hidden');
            
            if (id !== 'loader' && loaderInterval) {
                clearInterval(loaderInterval);
                loaderInterval = null;
            }
        }

        function showLoader() {
            showScreen('loader');
            var dots = document.getElementById('loader-dots');
            if (dots) {
                var count = 0;
                if (loaderInterval) clearInterval(loaderInterval);
                loaderInterval = setInterval(function() {
                    count = (count + 1) % 4;
                    dots.textContent = '.'.repeat(count);
                }, 500);
            }
        }

        function jsonp(url, callback) {
            var cbName = 'fc_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5);
            console.log('JSONP request:', url, 'callback:', cbName);
            
            window[cbName] = function(data) {
                console.log('JSONP response:', data);
                callback(null, data);
                delete window[cbName];
            };
            
            var separator = url.indexOf('?') === -1 ? '?' : '&';
            var scriptUrl = url + separator + 'callback=' + cbName;
            
            var script = document.createElement('script');
            script.src = scriptUrl;
            script.onerror = function() {
                console.error('JSONP error for:', scriptUrl);
                callback(new Error('Network error'), null);
                delete window[cbName];
                document.head.removeChild(script);
            };
            document.head.appendChild(script);
        }

        // ============== ПРОВЕРКА STARTAPP (С ДЕБАГОМ) ==============
        function checkStartParam() {
            console.log('=== checkStartParam START ===');
            console.log('Full URL:', window.location.href);
            console.log('Search params:', window.location.search);
            console.log('Hash:', window.location.hash);
            
            var startapp = null;

            // Способ 1: Telegram WebApp initData
            try {
                if (webApp && webApp.initDataUnsafe) {
                    startapp = webApp.initDataUnsafe.startapp;
                    console.log('startapp from initData:', startapp);
                }
            } catch(e) {
                console.log('Error reading initData:', e);
            }

            // Способ 2: URL параметры
            if (!startapp) {
                try {
                    var urlParams = new URLSearchParams(window.location.search);
                    startapp = urlParams.get('startapp');
                    console.log('startapp from URL params:', startapp);
                } catch(e) {
                    console.log('Error parsing URL params:', e);
                }
            }

            // Способ 3: tgWebAppData в хеше
            if (!startapp) {
                try {
                    var hash = window.location.hash;
                    if (hash) {
                        var hashParams = new URLSearchParams(hash.substring(1));
                        var tgData = hashParams.get('tgWebAppData');
                        if (tgData) {
                            var decoded = decodeURIComponent(tgData);
                            console.log('Decoded tgWebAppData:', decoded);
                            var urlParams = new URLSearchParams(decoded);
                            startapp = urlParams.get('startapp');
                            console.log('startapp from tgWebAppData:', startapp);
                        }
                    }
                } catch(e) {
                    console.log('Error parsing hash:', e);
                }
            }

            // Способ 4: Прямой парсинг всего URL
            if (!startapp) {
                try {
                    var fullUrl = window.location.href;
                    var match = fullUrl.match(/startapp=([^&]+)/);
                    if (match) startapp = match[1];
                    console.log('startapp from full URL:', startapp);
                } catch(e) {
                    console.log('Error parsing full URL:', e);
                }
            }

            if (startapp) {
                var pollId = startapp.replace('poll_', '').trim().replace(/[^a-zA-Z0-9]/g, '');
                console.log('Extracted poll ID:', pollId);
                if (pollId) {
                    loadPoll(pollId);
                } else {
                    console.log('No valid poll ID found');
                }
            } else {
                console.log('No startapp parameter found');
            }
            console.log('=== checkStartParam END ===');
        }

        // ============== ЗАГРУЗКА ОПРОСА ==============
        function loadPoll(pollId) {
            console.log('Loading poll:', pollId);
            showLoader();
            jsonp(GAS_URL + '?action=getPoll&pollId=' + pollId, function(err, data) {
                if (err || !data || !data.options) {
                    console.error('Failed to load poll:', err, data);
                    showScreen('home-screen');
                    showError('Опрос не найден или устарел');
                    return;
                }
                console.log('Poll loaded:', data);
                currentPoll = data;
                currentPollId = pollId;
                currentOptions = data.options.slice();
                document.getElementById('question-display').textContent = data.question;
                renderRankings();
                showScreen('vote-screen');
            });
        }

        // ============== СОЗДАНИЕ ОПРОСА ==============
        function createPoll(retryCount) {
            retryCount = retryCount || 0;
            
            var question = document.getElementById('question').value.trim();
            var rawOptions = document.getElementById('options').value.trim();
            
            if (!question) { showError('Введите вопрос'); return; }
            if (!rawOptions) { showError('Введите варианты ответов'); return; }
            
            currentOptions = rawOptions.split(/[,\n]/)
                .map(function(o) { return o.trim(); })
                .filter(function(o) { return o.length > 0; });
            
            if (currentOptions.length < 2) { 
                showError('Нужно минимум 2 варианта'); 
                return; 
            }
            
            if (currentOptions.length > 3) {
                currentOptions = currentOptions
                    .sort(function() { return Math.random() - 0.5; })
                    .slice(0, 3);
                showSuccess('Выбраны 3 случайных варианта');
            }
            
            showLoader();
            
            var params = new URLSearchParams({
                action: 'create',
                question: question,
                options: JSON.stringify(currentOptions),
                userId: userId
            });
            
            console.log('Creating poll with params:', params.toString());
            
            jsonp(GAS_URL + '?' + params.toString(), function(err, data) {
                if (err || !data || !data.pollId) {
                    console.error('Failed to create poll:', err, data);
                    if (retryCount < MAX_RETRIES) {
                        showError('Повторная попытка (' + (retryCount + 1) + '/' + MAX_RETRIES + ')...');
                        setTimeout(function() { createPoll(retryCount + 1); }, RETRY_DELAY);
                    } else {
                        showScreen('home-screen');
                        showError('Сервер временно недоступен. Попробуйте позже.');
                    }
                    return;
                }
                
                console.log('Poll created:', data);
                currentPollId = data.pollId;
                currentPoll = data;
                
                // Формируем оба варианта ссылок
                var pollParam = 'poll_' + data.pollId;
                
                // Основная ссылка (через бота)
                var botLink = 'https://t.me/' + BOT_USERNAME + '?startapp=' + pollParam;
                
                // Прямая ссылка (на WebApp)
                var directLink = WEBAPP_URL + '?startapp=' + pollParam;
                
                console.log('Bot link:', botLink);
                console.log('Direct link:', directLink);
                
                document.getElementById('share-link-text').textContent = botLink;
                document.getElementById('direct-link-text').textContent = directLink;
                
                showScreen('created-screen');
                showSuccess('Опрос успешно создан!');
            });
        }

        // ============== РАНЖИРОВАНИЕ ==============
        function renderRankings() {
            var container = document.getElementById('rankings');
            var medals = ['🥇', '🥈', '🥉'];
            
            container.innerHTML = currentOptions.map(function(option, index) {
                var upDisabled = index === 0 ? ' disabled' : '';
                var downDisabled = index === currentOptions.length - 1 ? ' disabled' : '';
                
                return '<div class="poll-card" style="display:flex;align-items:center;gap:12px;">' +
                    '<div style="display:flex;flex-direction:column;gap:4px;">' +
                    '<button class="sort-btn" onclick="window.fcMoveUp(' + index + ')"' + upDisabled + '>▲</button>' +
                    '<button class="sort-btn" onclick="window.fcMoveDown(' + index + ')"' + downDisabled + '>▼</button>' +
                    '</div>' +
                    '<span style="flex:1;">' + medals[index] + ' ' + option + '</span>' +
                    '</div>';
            }).join('');
        }

        window.fcMoveUp = function(index) {
            if (index === 0) return;
            var temp = currentOptions[index];
            currentOptions[index] = currentOptions[index - 1];
            currentOptions[index - 1] = temp;
            renderRankings();
        };

        window.fcMoveDown = function(index) {
            if (index === currentOptions.length - 1) return;
            var temp = currentOptions[index];
            currentOptions[index] = currentOptions[index + 1];
            currentOptions[index + 1] = temp;
            renderRankings();
        };

        function shuffleOptions() {
            currentOptions = currentOptions.sort(function() { return Math.random() - 0.5; });
            renderRankings();
        }

        // ============== ГОЛОСОВАНИЕ ==============
        function submitVote(retryCount) {
            retryCount = retryCount || 0;
            showLoader();
            
            var rankings = {};
            currentOptions.forEach(function(option, sortedIndex) {
                var originalIndex = currentPoll.options.indexOf(option);
                if (originalIndex === -1) originalIndex = sortedIndex;
                
                if (sortedIndex === 0) rankings.first = originalIndex;
                if (sortedIndex === 1) rankings.second = originalIndex;
                if (sortedIndex === 2) rankings.third = originalIndex;
            });
            
            console.log('Submitting vote:', { pollId: currentPollId, userId: userId, rankings: rankings });
            
            var params = new URLSearchParams({
                action: 'vote',
                pollId: currentPollId,
                userId: userId,
                rankings: JSON.stringify(rankings)
            });
            
            jsonp(GAS_URL + '?' + params.toString(), function(err, data) {
                if (err || !data || !data.scores) {
                    console.error('Failed to submit vote:', err, data);
                    if (retryCount < MAX_RETRIES) {
                        showError('Повторная попытка (' + (retryCount + 1) + '/' + MAX_RETRIES + ')...');
                        setTimeout(function() { submitVote(retryCount + 1); }, RETRY_DELAY);
                    } else {
                        showScreen('vote-screen');
                        showError('Сервер временно недоступен. Попробуйте позже.');
                    }
                    return;
                }
                
                console.log('Vote submitted:', data);
                currentPoll = data;
                renderResults();
                showScreen('results-screen');
            });
        }

        // ============== ОБНОВЛЕНИЕ РЕЗУЛЬТАТОВ ==============
        function refreshResults() {
            if (!currentPollId) return;
            showLoader();
            
            jsonp(GAS_URL + '?action=getPoll&pollId=' + currentPollId, function(err, data) {
                if (err || !data) {
                    showError('Не удалось обновить результаты');
                    showScreen('results-screen');
                    return;
                }
                currentPoll = data;
                renderResults();
                showScreen('results-screen');
            });
        }

        // ============== ОТОБРАЖЕНИЕ РЕЗУЛЬТАТОВ ==============
        function renderResults() {
            var container = document.getElementById('results-display');
            
            if (!currentPoll || !currentPoll.scores) {
                container.innerHTML = '<p style="text-align:center;">Нет результатов</p>';
                return;
            }
            
            var sorted = Object.entries(currentPoll.scores)
                .sort(function(a, b) { return b[1] - a[1]; });
            
            var medals = ['🥇', '🥈', '🥉'];
            
            var html = sorted.map(function(entry, index) {
                var optionIndex = parseInt(entry[0]);
                var optionText = currentPoll.options[optionIndex] || 'Вариант ' + (optionIndex + 1);
                var score = entry[1];
                return '<div class="poll-card">' + 
                    medals[index] + ' <strong>' + optionText + '</strong><br>' +
                    '<span style="font-size:14px;color:rgba(255,255,255,0.7);">' + score + ' очков</span>' +
                    '</div>';
            }).join('');
            
            html += '<p class="voter-count">👥 Проголосовало: ' + 
                (currentPoll.totalVoters || 0) + ' человек</p>';
            
            container.innerHTML = html;
        }

        // ============== ШЕРИНГ ==============
        function shareTextViaTelegram(text, url) {
            var shareUrl = 'https://t.me/share/url?' + 
                'url=' + encodeURIComponent(url) + 
                '&text=' + encodeURIComponent(text);
            
            console.log('Sharing:', { text: text, url: url, shareUrl: shareUrl });
            
            // Способ 1: Telegram WebApp API
            try {
                if (webApp && typeof webApp.openTelegramLink === 'function') {
                    webApp.openTelegramLink(shareUrl);
                    console.log('Shared via openTelegramLink');
                    return true;
                }
            } catch(e) {
                console.log('openTelegramLink failed:', e);
            }
            
            // Способ 2: Telegram openLink
            try {
                if (webApp && typeof webApp.openLink === 'function') {
                    webApp.openLink(shareUrl);
                    console.log('Shared via openLink');
                    return true;
                }
            } catch(e) {
                console.log('openLink failed:', e);
            }
            
            // Способ 3: Копирование в буфер обмена
            copyToClipboard(text + '\n\n' + url, url);
            return true;
        }

        function copyToClipboard(fullText, url) {
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(fullText).then(function() {
                    showCopySuccess();
                }).catch(function() {
                    fallbackCopy(fullText, url);
                });
            } else {
                fallbackCopy(fullText, url);
            }
        }

        function fallbackCopy(text, url) {
            var textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.top = '0';
            textarea.style.left = '0';
            textarea.style.opacity = '0';
            document.body.appendChild(textarea);
            textarea.select();
            
            try {
                document.execCommand('copy');
                showCopySuccess();
            } catch(e) {
                alert('Ссылка для голосования:\n\n' + url);
            }
            
            document.body.removeChild(textarea);
        }

        function showCopySuccess() {
            if (webApp && typeof webApp.showPopup === 'function') {
                webApp.showPopup({
                    title: '📋 Ссылка скопирована!',
                    message: 'Отправьте её в чат, чтобы поделиться опросом.',
                    buttons: [{type: 'ok'}]
                });
            } else {
                alert('📋 Ссылка скопирована! Отправьте её в чат.');
            }
        }

        function sharePollLink() {
            var link = document.getElementById('share-link-text').textContent;
            
            if (!link || link.indexOf('undefined') !== -1 || !currentPoll) {
                showError('Сначала создайте опрос');
                return;
            }
            
            var shareText = '🗳️ ' + currentPoll.question + '\n\nГолосуй в опросе:';
            shareTextViaTelegram(shareText, link);
        }

        function shareDirectLink() {
            var link = document.getElementById('direct-link-text').textContent;
            
            if (!link || link.indexOf('undefined') !== -1 || !currentPoll) {
                showError('Сначала создайте опрос');
                return;
            }
            
            var shareText = '🗳️ ' + currentPoll.question + '\n\nГолосуй в опросе (прямая ссылка):';
            shareTextViaTelegram(shareText, link);
        }

        function shareResults() {
            if (!currentPoll || !currentPollId) {
                showError('Нет результатов для шаринга');
                return;
            }
            
            var link = 'https://t.me/' + BOT_USERNAME + '?startapp=poll_' + currentPollId;
            
            var sorted = Object.entries(currentPoll.scores)
                .sort(function(a, b) { return b[1] - a[1]; });
            
            var medals = ['🥇', '🥈', '🥉'];
            var resultsText = sorted.map(function(entry, index) {
                var optionText = currentPoll.options[parseInt(entry[0])] || 'Вариант';
                return medals[index] + ' ' + optionText + ' — ' + entry[1] + ' очков';
            }).join('\n');
            
            var shareText = '🏆 Результаты: ' + currentPoll.question + '\n\n' + 
                resultsText + '\n\n' +
                '👥 Проголосовало: ' + (currentPoll.totalVoters || 0) + ' человек\n\n' +
                'Присоединяйся к голосованию:';
            
            shareTextViaTelegram(shareText, link);
        }

        // ============== ОБРАБОТЧИКИ СОБЫТИЙ ==============
        document.getElementById('create-btn').addEventListener('click', function() {
            createPoll(0);
        });

        document.getElementById('shuffle-btn').addEventListener('click', shuffleOptions);

        document.getElementById('vote-btn').addEventListener('click', function() {
            submitVote(0);
        });

        document.getElementById('share-link-btn').addEventListener('click', sharePollLink);
        
        document.getElementById('share-direct-btn').addEventListener('click', shareDirectLink);

        document.getElementById('share-results-btn').addEventListener('click', shareResults);

        document.getElementById('refresh-btn').addEventListener('click', refreshResults);

        document.getElementById('refresh-results-btn').addEventListener('click', refreshResults);

        document.getElementById('vote-now-btn').addEventListener('click', function() {
            if (!currentPoll) return;
            document.getElementById('question-display').textContent = currentPoll.question;
            currentOptions = currentPoll.options.slice();
            renderRankings();
            showScreen('vote-screen');
        });

        document.getElementById('back-home-btn').addEventListener('click', function() {
            showScreen('home-screen');
        });

        document.getElementById('new-poll-btn').addEventListener('click', function() {
            currentPollId = null;
            currentPoll = null;
            currentOptions = [];
            showScreen('home-screen');
        });

        // Запуск проверки startapp
        checkStartParam();

        console.log('=== FairChoice Lite v16.2 initialized ===');
        console.log('WebApp URL:', WEBAPP_URL);
        console.log('Bot:', BOT_USERNAME);
        console.log('User ID:', userId);
    })();
    </script>
</body>
</html>
