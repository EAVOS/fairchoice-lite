<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FairChoice Lite</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #ffffff;
            min-height: 100vh;
            padding: 16px;
        }
        #app { max-width: 400px; margin: 0 auto; }
        h1 { font-size: 24px; font-weight: 700; margin-bottom: 16px; text-align: center; }
        
        .input-field {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            margin: 8px 0;
            font-size: 16px;
            background: rgba(255,255,255,0.1);
            color: #fff;
        }
        .input-field::placeholder { color: rgba(255,255,255,0.4); }
        
        textarea.input-field {
            resize: vertical;
            min-height: 60px;
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin: 8px 0;
            transition: all 0.15s ease;
        }
        .btn:active { transform: scale(0.97); opacity: 0.85; }
        
        .btn-primary {
            background: #39ff14;
            color: #1a1a2e;
        }
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .btn-share {
            background: rgba(255,215,0,0.2);
            color: #ffd700;
            border: 1px solid rgba(255,215,0,0.3);
        }
        
        .poll-card {
            background: rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 14px;
            margin: 8px 0;
            font-size: 16px;
        }
        
        .error-msg {
            color: #ff4444;
            text-align: center;
            padding: 8px;
            display: none;
            font-size: 14px;
        }
        .error-msg.show { display: block; }
        
        .voter-count {
            text-align: center;
            color: rgba(255,255,255,0.5);
            font-size: 14px;
            margin-top: 12px;
        }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="app">
        <div id="home-screen">
            <h1>📊 FairChoice Lite</h1>
            <input type="text" id="question" class="input-field" placeholder="Что выбираем?">
            <textarea id="options" class="input-field" placeholder="Пицца, Суши, Бургер" rows="3"></textarea>
            <button class="btn btn-primary" onclick="createPoll()">🚀 Быстрый выбор</button>
            <p id="error" class="error-msg"></p>
        </div>
        
        <div id="vote-screen" class="hidden">
            <h1 id="question-display"></h1>
            <div id="rankings"></div>
            <button class="btn btn-secondary" onclick="shuffle()">🎲 Перемешать</button>
            <button class="btn btn-primary" onclick="submitVote()">✅ Проголосовать</button>
        </div>
        
        <div id="results-screen" class="hidden">
            <h1>🏆 Результаты</h1>
            <div id="results-display"></div>
            <button class="btn btn-share" onclick="shareResults()">📤 Поделиться</button>
            <button class="btn btn-secondary" onclick="location.reload()">🔄 Новый опрос</button>
        </div>
        
        <div id="loader" class="hidden" style="text-align:center;padding:40px;">
            <p style="color:rgba(255,255,255,0.6);">Загрузка...</p>
        </div>
    </div>
    
    <script src="app.js?v=3"></script>
</body>
</html>
